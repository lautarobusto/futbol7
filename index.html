<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fútbol 7</title>
  <meta name="theme-color" content="#0d1117">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <span class="header-title">⚽ Fútbol 7</span>
    <nav class="tabs">
      <button class="tab active" data-tab="jugadores">Jugadores</button>
      <button class="tab" data-tab="partido">Partido</button>
      <button class="tab" data-tab="equipos">Equipos</button>
      <button class="tab" data-tab="historial">Historial</button>
    </nav>
  </header>

  <main>

    <!-- Tab: Jugadores -->
    <section id="tab-jugadores" class="tab-content active">
      <div class="bar">
        <span id="player-count" class="muted">0 jugadores</span>
        <div class="bar-actions">
          <button class="btn btn-ghost" id="btn-sort-players">Orden: puntaje</button>
          <button class="btn btn-primary" id="btn-add-player">+ Jugador</button>
        </div>
      </div>
      <div id="players-list"></div>
    </section>

    <!-- Tab: Partido -->
    <section id="tab-partido" class="tab-content">
      <div class="bar">
        <span id="match-count" class="muted">0 disponibles</span>
        <button class="btn btn-secondary" id="btn-add-guest">+ Invitado</button>
      </div>
      <div id="match-list"></div>
    </section>

    <!-- Tab: Equipos -->
    <section id="tab-equipos" class="tab-content">
      <div class="paste-area">
        <textarea id="wsp-input" placeholder="Pegá la lista del grupo de WhatsApp..." rows="3"></textarea>
        <button class="btn btn-primary" id="btn-parse-list">Cargar lista</button>
      </div>
      <div id="parse-summary"></div>
      <div class="bar" style="margin-top:12px">
        <div class="bar-actions">
          <button class="btn btn-secondary" id="btn-save-match" style="display:none">Confirmar equipos</button>
          <button class="btn btn-wsp" id="btn-share" style="display:none">
            <svg viewBox="0 0 24 24" width="15" height="15" fill="currentColor" aria-hidden="true"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
            Compartir
          </button>
        </div>
        <span id="teams-count" class="muted"></span>
      </div>
      <div id="teams-display"></div>
      <div id="teams-feedback" class="parse-summary"></div>
    </section>

    <!-- Tab: Historial -->
    <section id="tab-historial" class="tab-content">
      <div class="bar">
        <span id="history-count" class="muted">0 partidos guardados</span>
        <button class="btn btn-ghost" id="btn-clear-history">Borrar historial</button>
      </div>
      <div id="history-list"></div>
    </section>

  </main>

  <!-- Modal -->
  <div id="modal-overlay" class="modal-overlay hidden" role="dialog" aria-modal="true">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modal-title">Jugador</h2>
        <button class="modal-close" id="modal-close" aria-label="Cerrar">&times;</button>
      </div>
      <form id="player-form" autocomplete="off">
        <div class="form-group">
          <label for="input-name">Nombre</label>
          <input type="text" id="input-name" placeholder="Nombre del jugador" required maxlength="32">
        </div>
        <div class="form-group">
          <div class="metric-label">
            <label for="input-control">Control</label>
            <span class="metric-value" id="val-control">5</span>
          </div>
          <input type="range" id="input-control" min="1" max="10" value="5">
        </div>
        <div class="form-group">
          <div class="metric-label">
            <label for="input-fisica">Estado físico</label>
            <span class="metric-value" id="val-fisica">5</span>
          </div>
          <input type="range" id="input-fisica" min="1" max="10" value="5">
        </div>
        <div class="form-group">
          <div class="metric-label">
            <label for="input-velocidad">Velocidad</label>
            <span class="metric-value" id="val-velocidad">5</span>
          </div>
          <input type="range" id="input-velocidad" min="1" max="10" value="5">
        </div>
        <div class="form-actions">
          <button type="button" class="btn btn-ghost" id="modal-cancel">Cancelar</button>
          <button type="submit" class="btn btn-primary">Guardar</button>
        </div>
      </form>
    </div>
  </div>

  <div id="save-match-overlay" class="modal-overlay hidden" role="dialog" aria-modal="true">
    <div class="modal">
      <div class="modal-header">
        <h2 id="save-match-title">Cargar resultado</h2>
        <button class="modal-close" id="save-match-close" aria-label="Cerrar">&times;</button>
      </div>
      <form id="save-match-form" autocomplete="off">
        <div class="form-group">
          <label for="input-goals-negro">Resultado Negro</label>
          <input type="number" id="input-goals-negro" min="0" inputmode="numeric">
        </div>
        <div class="form-group">
          <label for="input-goals-blanco">Resultado Blanco</label>
          <input type="number" id="input-goals-blanco" min="0" inputmode="numeric">
        </div>
        <div class="form-group">
          <label for="input-balance">Opinión de balanceo</label>
          <select id="input-balance" required>
            <option value="balanced">Balanceado</option>
            <option value="negro_better">Negro dominó</option>
            <option value="blanco_better">Blanco dominó</option>
            <option value="very_unbalanced">Muy desbalanceado</option>
          </select>
        </div>
        <div class="form-actions">
          <button type="button" class="btn btn-ghost" id="save-match-cancel">Cancelar</button>
          <button type="submit" class="btn btn-primary">Guardar</button>
        </div>
      </form>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
